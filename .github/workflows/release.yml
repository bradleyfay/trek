name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf trek-${{ matrix.target }}.tar.gz trek
          mv trek-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/
      - uses: actions/upload-artifact@v4
        with:
          name: trek-${{ matrix.target }}
          path: trek-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            gh release upload ${{ github.ref_name }} \
              trek-aarch64-apple-darwin.tar.gz \
              trek-x86_64-apple-darwin.tar.gz
          else
            gh release create ${{ github.ref_name }} \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              trek-aarch64-apple-darwin.tar.gz \
              trek-x86_64-apple-darwin.tar.gz
          fi

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}

          ARM_URL="https://github.com/bradleyfay/trek/releases/download/${VERSION}/trek-aarch64-apple-darwin.tar.gz"
          X86_URL="https://github.com/bradleyfay/trek/releases/download/${VERSION}/trek-x86_64-apple-darwin.tar.gz"

          ARM_SHA=$(curl -sL "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)
          X86_SHA=$(curl -sL "$X86_URL" | shasum -a 256 | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/bradleyfay/homebrew-trek.git
          cd homebrew-trek

          cat > Formula/trek.rb << EOF
          class Trek < Formula
            desc "A terminal file manager with mouse-resizable panes"
            homepage "https://github.com/bradleyfay/trek"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "${ARM_URL}"
                sha256 "${ARM_SHA}"
              end
              on_intel do
                url "${X86_URL}"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "trek"
            end

            test do
              system "\#{bin}/trek", "--help"
            end
          end
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/trek.rb
          git commit -m "trek ${VERSION_NUM}"
          git push
